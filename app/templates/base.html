<!--
===============================================================================
PLANTILLA BASE DEL SISTEMA
-------------------------------------------------------------------------------
Este archivo contiene la estructura principal que compartirán todas las páginas
del Sistema Integral de Gestión Comercial.

Su función es evitar repetir código HTML en cada vista. Aquí se cargan los
recursos comunes del sistema, como Bootstrap, el archivo CSS propio y la
estructura básica del documento (head y body).

Las páginas específicas (Inicio, Catálogo, Dashboard, Inventario, Ventas,
etc.) heredarán esta plantilla y únicamente reemplazarán las secciones
definidas con bloques de Jinja2, como el título y el contenido principal.

Autor: José Franco
Proyecto: Sistema Integral de Gestión Comercial
===============================================================================
-->

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sistema Integral de Gestión Comercial{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio del sistema -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

  {% block content %}{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
