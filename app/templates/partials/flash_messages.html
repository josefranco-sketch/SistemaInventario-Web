<!--
===============================================================================
MENSAJES FLASH

Muestra los mensajes temporales del sistema (éxito, error, aviso) que las
rutas envían con flash(). La categoría del mensaje coincide con las clases
de alerta de Bootstrap: success, danger, warning, info.

Se incluye desde base.html para que cualquier vista pueda mostrar mensajes.
===============================================================================
-->

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="container-xl mt-3">
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
