{% extends "base.html" %}

{% block title %}Página no encontrada | Los Altos{% endblock %}

{% block content %}
<!--
===============================================================================
ERROR 404 — página amigable (Fase 7)
Reemplaza la página de error por defecto de Flask, manteniendo la
navegación pública para que el usuario no quede en un callejón.
===============================================================================
-->
<div class="container py-5 text-center error-page">
  <p class="error-page__code">404</p>
  <h1 class="h3 fw-bold mb-2">Página no encontrada</h1>
  <p class="text-muted mb-4">
    La página que buscas no existe o el producto ya no está disponible.
  </p>
  <div class="d-flex justify-content-center gap-2 flex-wrap">
    <a class="btn btn-primary" href="{{ url_for('public.catalog') }}">Ver catálogo</a>
    <a class="btn btn-outline-secondary" href="{{ url_for('public.home') }}">Ir al inicio</a>
  </div>
</div>
{% endblock %}
