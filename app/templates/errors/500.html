{% extends "base.html" %}

{% block title %}Error del sistema | Los Altos{% endblock %}

{% block content %}
<div class="container py-5 text-center error-page">
  <p class="error-page__code">500</p>
  <h1 class="h3 fw-bold mb-2">Algo salió mal</h1>
  <p class="text-muted mb-4">
    Ocurrió un error inesperado. Intenta de nuevo; si el problema
    continúa, avisa al administrador.
  </p>
  <a class="btn btn-primary" href="{{ url_for('public.home') }}">Ir al inicio</a>
</div>
{% endblock %}
